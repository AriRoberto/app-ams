services:
  cidadeatende-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cidadeatende-api
    init: true
    ports:
      - "3334:3334"
    environment:
      PORT: 3334
      HOST: 0.0.0.0
      CORS_ORIGIN: "*"
      DB_FILE: /app/data/db.json
    volumes:
      - ams_data:/app/data
    stop_signal: SIGTERM
    stop_grace_period: 20s
    restart: unless-stopped

volumes:
  ams_data:
