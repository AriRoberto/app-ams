<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CidadeAtende | Gestão de Solicitações Urbanas</title>
    <style>
      :root {
        --bg: #f3f7fb;
        --surface: #ffffff;
        --surface-2: #f7f9fc;
        --primary: #0057b8;
        --primary-2: #0077d9;
        --success: #1b8f49;
        --warning: #d68000;
        --danger: #c62828;
        --text: #172b4d;
        --text-soft: #52627a;
        --border: #d9e2ef;
        --shadow: 0 12px 32px rgba(7, 37, 77, 0.1);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Inter, "Segoe UI", Arial, sans-serif;
        color: var(--text);
        background: radial-gradient(circle at top right, #eaf4ff 0%, var(--bg) 42%);
      }

      .layout {
        max-width: 1180px;
        margin: 0 auto;
        padding: 24px;
      }

      .hero {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 16px;
        border-radius: 20px;
        padding: 24px;
        color: #fff;
        background: linear-gradient(115deg, #003f8f, #006ccb 56%, #008ef3);
        box-shadow: var(--shadow);
      }

      .hero h1 {
        margin: 0;
        font-size: 2rem;
      }

      .hero p {
        margin: 8px 0 0;
        opacity: 0.95;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.2);
        padding: 8px 14px;
        font-weight: 600;
      }

      .grid {
        display: grid;
        grid-template-columns: 1.1fr 0.9fr;
        gap: 20px;
        margin-top: 20px;
      }

      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 20px;
        box-shadow: 0 4px 18px rgba(10, 34, 65, 0.05);
      }

      .card h2 {
        margin: 0 0 14px;
        font-size: 1.1rem;
      }

      .form {
        display: grid;
        gap: 12px;
      }

      .input,
      .select,
      .button,
      textarea {
        width: 100%;
        border-radius: 12px;
        border: 1px solid var(--border);
        background: #fff;
        padding: 12px 14px;
        font: inherit;
        color: var(--text);
        transition: all 160ms ease;
      }

      .input:focus,
      .select:focus,
      textarea:focus {
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(0, 87, 184, 0.18);
        outline: none;
      }

      .button {
        cursor: pointer;
        border: none;
        color: #fff;
        font-weight: 600;
        background: linear-gradient(125deg, var(--primary), var(--primary-2));
      }

      .button:hover {
        filter: brightness(1.05);
        transform: translateY(-1px);
      }

      .button.secondary {
        color: var(--primary);
        border: 1px solid #bed8f5;
        background: #eff6ff;
      }

      .buttonRow {
        display: flex;
        gap: 8px;
      }

      .small {
        margin: 0;
        color: var(--text-soft);
        font-size: 0.9rem;
      }

      .statusMessage {
        min-height: 22px;
        margin: 0;
        font-weight: 600;
      }

      .statusMessage.error {
        color: var(--danger);
      }

      .statusMessage.success {
        color: var(--success);
      }

      .chip {
        display: inline-flex;
        align-items: center;
        border-radius: 999px;
        background: #ebf4ff;
        color: var(--primary);
        border: 1px solid #cfe4ff;
        padding: 6px 10px;
        font-size: 0.82rem;
        font-weight: 600;
      }

      .requestList {
        display: grid;
        gap: 12px;
        margin-top: 14px;
      }

      .protocolCard {
        border: 1px solid var(--border);
        border-radius: 12px;
        background: var(--surface-2);
        padding: 14px;
      }

      .protocolHeader {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        gap: 8px;
      }

      .statusTag {
        border-radius: 999px;
        padding: 4px 10px;
        font-size: 0.78rem;
        font-weight: 700;
      }

      .status-RECEBIDO { background: #e8f0ff; color: #084fab; }
      .status-EM_ANALISE { background: #fff6e4; color: #895f00; }
      .status-EM_EXECUCAO { background: #e8f7ff; color: #00689a; }
      .status-CONCLUIDO { background: #e9f8ef; color: #0b7a39; }

      @media (max-width: 980px) {
        .grid { grid-template-columns: 1fr; }
        .hero { flex-direction: column; align-items: flex-start; }
      }
    </style>
  </head>
  <body>
    <main class="layout">
      <section class="hero">
        <div>
          <h1>CidadeAtende</h1>
          <p>Canal digital municipal para registrar, monitorar e resolver demandas urbanas com transparência.</p>
        </div>
        <div class="badge">Demo ao vivo • Atendimento inteligente</div>
      </section>

      <div class="grid">
        <section class="card">
          <h2>Cadastro do morador</h2>
          <form id="registerForm" class="form">
            <input id="nome" class="input" placeholder="Nome completo" required minlength="2" />
            <input id="cpf" class="input" placeholder="CPF" required maxlength="14" />
            <input id="email" class="input" type="email" placeholder="E-mail" required />
            <button class="button" type="submit">Cadastrar / Entrar</button>
          </form>
          <p id="userInfo" class="small"></p>

          <h2 style="margin-top: 24px">Nova solicitação</h2>
          <form id="requestForm" class="form">
            <select id="category" class="select" required>
              <option value="ILUMINACAO_PUBLICA">Iluminação pública</option>
              <option value="BURACO_EM_VIA">Buraco em via</option>
              <option value="LIMPEZA_URBANA">Limpeza urbana</option>
              <option value="MANUTENCAO_ESPACO_PUBLICO">Manutenção em espaço público</option>
            </select>
            <textarea id="descricao" rows="4" placeholder="Descreva o problema em detalhes" required minlength="5"></textarea>

            <div class="buttonRow">
              <button class="button secondary" id="geoBtn" type="button">Usar minha localização</button>
            </div>
            <p id="geoInfo" class="small">A localização será preenchida automaticamente quando permitido.</p>

            <input id="endereco" class="input" placeholder="Endereço de referência (fallback manual)" />
            <div class="buttonRow">
              <input id="latitude" class="input" type="number" step="any" placeholder="Latitude" required />
              <input id="longitude" class="input" type="number" step="any" placeholder="Longitude" required />
            </div>
            <input id="fotoUrl" class="input" placeholder="URL da foto (opcional)" />
            <button class="button" type="submit">Enviar solicitação</button>
          </form>
        </section>

        <section class="card">
          <div style="display:flex;justify-content:space-between;align-items:center;gap:8px">
            <h2 style="margin:0">Protocolos do morador</h2>
            <button id="refreshBtn" class="button secondary" type="button">Atualizar</button>
          </div>
          <p id="message" class="statusMessage"></p>
          <div id="list" class="requestList"></div>
        </section>
      </div>
    </main>

    <script>
      const api = '/api';
      const key = 'amsUser';

      const userInfo = document.getElementById('userInfo');
      const list = document.getElementById('list');
      const message = document.getElementById('message');
      const geoInfo = document.getElementById('geoInfo');

      function escapeHtml(value) {
        return String(value)
          .replaceAll('&', '&amp;')
          .replaceAll('<', '&lt;')
          .replaceAll('>', '&gt;')
          .replaceAll('"', '&quot;')
          .replaceAll("'", '&#39;');
      }

      function showMessage(text, tone = 'error') {
        message.textContent = text || '';
        message.className = `statusMessage ${tone}`;
      }

      function getUser() {
        const raw = localStorage.getItem(key);
        return raw ? JSON.parse(raw) : null;
      }

      function setUser(user) {
        localStorage.setItem(key, JSON.stringify(user));
        userInfo.innerHTML = `<span class="chip">Morador ativo: ${escapeHtml(user.nome)} (${escapeHtml(user.id)})</span>`;
      }

      async function fetchJson(url, options) {
        const response = await fetch(url, options);
        const data = await response.json();
        if (!response.ok) {
          const error = new Error(data.message || 'Falha na comunicação com API.');
          error.status = response.status;
          error.payload = data;
          throw error;
        }
        return data;
      }

      function renderRequests(items) {
        if (!items.length) {
          list.innerHTML = '<p class="small">Nenhuma solicitação encontrada para este morador.</p>';
          return;
        }

        list.innerHTML = items.map((item) => `
          <article class="protocolCard">
            <div class="protocolHeader">
              <strong>${escapeHtml(item.protocol)}</strong>
              <span class="statusTag status-${escapeHtml(item.status)}">${escapeHtml(item.status)}</span>
            </div>
            <p><strong>Categoria:</strong> ${escapeHtml(item.category)}</p>
            <p><strong>Descrição:</strong> ${escapeHtml(item.descricao)}</p>
            <p><strong>Endereço:</strong> ${escapeHtml(item.endereco || 'Não informado')}</p>
            <p><strong>Geo:</strong> ${escapeHtml(item.latitude)}, ${escapeHtml(item.longitude)}</p>
            <p class="small">Atualizado: ${new Date(item.updatedAt).toLocaleString()}</p>
          </article>
        `).join('');
      }

      async function loadRequests() {
        const user = getUser();
        if (!user) {
          renderRequests([]);
          return;
        }

        try {
          const items = await fetchJson(`${api}/requests?userId=${encodeURIComponent(user.id)}`);
          renderRequests(items);
          showMessage('Protocolos sincronizados com sucesso.', 'success');
        } catch (error) {
          showMessage(error.message, 'error');
        }
      }

      function useBrowserGeolocation() {
        if (!navigator.geolocation) {
          geoInfo.textContent = 'Geolocalização indisponível neste navegador. Preencha manualmente endereço e coordenadas.';
          return;
        }

        geoInfo.textContent = 'Obtendo localização atual...';
        navigator.geolocation.getCurrentPosition(
          (position) => {
            document.getElementById('latitude').value = position.coords.latitude.toFixed(6);
            document.getElementById('longitude').value = position.coords.longitude.toFixed(6);
            geoInfo.textContent = 'Localização capturada automaticamente. Ajuste manualmente se necessário.';
          },
          () => {
            geoInfo.textContent = 'Sem permissão de localização. Use o endereço e coordenadas manualmente.';
          },
          {
            enableHighAccuracy: true,
            timeout: 10000,
            maximumAge: 30000
          }
        );
      }

      document.getElementById('geoBtn').addEventListener('click', useBrowserGeolocation);

      document.getElementById('registerForm').addEventListener('submit', async (event) => {
        event.preventDefault();
        showMessage('');

        const body = {
          nome: document.getElementById('nome').value,
          cpf: document.getElementById('cpf').value,
          email: document.getElementById('email').value
        };

        try {
          const data = await fetchJson(`${api}/auth/register`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
          });
          setUser(data.user);
          showMessage('Cadastro concluído com sucesso.', 'success');
          loadRequests();
        } catch (error) {
          if (error.status === 409 && error.payload?.user) {
            setUser(error.payload.user);
            showMessage('Morador já cadastrado. Sessão carregada.', 'success');
            loadRequests();
            return;
          }
          showMessage(error.message, 'error');
        }
      });

      document.getElementById('requestForm').addEventListener('submit', async (event) => {
        event.preventDefault();
        showMessage('');
        const user = getUser();
        if (!user) {
          showMessage('Cadastre o morador antes de abrir a solicitação.', 'error');
          return;
        }

        const body = {
          userId: user.id,
          category: document.getElementById('category').value,
          descricao: document.getElementById('descricao').value,
          endereco: document.getElementById('endereco').value,
          latitude: Number(document.getElementById('latitude').value),
          longitude: Number(document.getElementById('longitude').value),
          fotoUrl: document.getElementById('fotoUrl').value
        };

        try {
          const data = await fetchJson(`${api}/requests`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
          });
          showMessage(`Solicitação criada com protocolo ${data.protocol}.`, 'success');
          document.getElementById('descricao').value = '';
          loadRequests();
        } catch (error) {
          showMessage(error.message, 'error');
        }
      });

      document.getElementById('refreshBtn').addEventListener('click', loadRequests);

      const current = getUser();
      if (current) {
        setUser(current);
        loadRequests();
      }
      useBrowserGeolocation();
    </script>
  </body>
</html>
