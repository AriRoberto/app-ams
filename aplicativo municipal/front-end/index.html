<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CidadeAtende - MVP</title>
    <style>
      :root {
        color-scheme: light;
      }
      body {
        font-family: Arial, sans-serif;
        max-width: 900px;
        margin: 20px auto;
        padding: 0 12px;
      }
      form {
        display: grid;
        gap: 8px;
        margin-bottom: 16px;
      }
      input,
      select,
      textarea,
      button {
        padding: 10px;
      }
      .card {
        border: 1px solid #ddd;
        border-radius: 8px;
        padding: 12px;
        margin-bottom: 10px;
      }
      .status {
        font-weight: bold;
      }
      .error {
        color: #b00020;
      }
    </style>
  </head>
  <body>
    <h1>CidadeAtende (MVP)</h1>
    <p>Cadastro rápido + abertura de solicitação + acompanhamento de protocolos.</p>

    <h2>1) Cadastro cidadão</h2>
    <form id="registerForm">
      <input id="nome" placeholder="Nome" required minlength="2" />
      <input id="cpf" placeholder="CPF" required maxlength="14" />
      <input id="email" placeholder="E-mail" type="email" required />
      <button type="submit">Cadastrar</button>
    </form>
    <p id="userInfo"></p>

    <h2>2) Abrir solicitação</h2>
    <form id="requestForm">
      <select id="category" required>
        <option value="ILUMINACAO_PUBLICA">Iluminação pública</option>
        <option value="BURACO_EM_VIA">Buraco em via</option>
        <option value="LIMPEZA_URBANA">Limpeza urbana</option>
        <option value="MANUTENCAO_ESPACO_PUBLICO">Manutenção em espaço público</option>
      </select>
      <textarea id="descricao" placeholder="Descreva o problema" required minlength="5"></textarea>
      <input id="endereco" placeholder="Endereço" />
      <input id="latitude" type="number" step="any" placeholder="Latitude" required />
      <input id="longitude" type="number" step="any" placeholder="Longitude" required />
      <input id="fotoUrl" placeholder="URL da foto (opcional)" />
      <button type="submit">Enviar solicitação</button>
    </form>

    <h2>3) Meus protocolos</h2>
    <button id="refreshBtn">Atualizar lista</button>
    <p id="error" class="error"></p>
    <div id="list"></div>

    <script>
      const api = '/api';
      const key = 'amsUser';

      const userInfo = document.getElementById('userInfo');
      const list = document.getElementById('list');
      const errorNode = document.getElementById('error');

      function escapeHtml(value) {
        return String(value)
          .replaceAll('&', '&amp;')
          .replaceAll('<', '&lt;')
          .replaceAll('>', '&gt;')
          .replaceAll('"', '&quot;')
          .replaceAll("'", '&#39;');
      }

      function showError(message) {
        errorNode.textContent = message || '';
      }

      function getUser() {
        const raw = localStorage.getItem(key);
        return raw ? JSON.parse(raw) : null;
      }

      function setUser(user) {
        localStorage.setItem(key, JSON.stringify(user));
        userInfo.textContent = `Cidadão: ${user.nome} | ID: ${user.id}`;
      }

      async function fetchJson(url, options) {
        const response = await fetch(url, options);
        const data = await response.json();
        if (!response.ok) {
          const error = new Error(data.message || 'Falha na comunicação com API.');
          error.status = response.status;
          error.payload = data;
          throw error;
        }
        return data;
      }

      async function loadRequests() {
        showError('');
        const user = getUser();
        if (!user) return;

        try {
          const items = await fetchJson(`${api}/requests?userId=${encodeURIComponent(user.id)}`);
          list.innerHTML =
            items
              .map(
                (item) => `
          <div class="card">
            <div><strong>Protocolo:</strong> ${escapeHtml(item.protocol)}</div>
            <div><strong>Categoria:</strong> ${escapeHtml(item.category)}</div>
            <div><strong>Descrição:</strong> ${escapeHtml(item.descricao)}</div>
            <div class="status"><strong>Status:</strong> ${escapeHtml(item.status)}</div>
            <div><strong>Atualizado em:</strong> ${new Date(item.updatedAt).toLocaleString()}</div>
          </div>
        `
              )
              .join('') || '<p>Sem solicitações.</p>';
        } catch (error) {
          showError(error.message);
        }
      }

      document.getElementById('registerForm').addEventListener('submit', async (event) => {
        event.preventDefault();
        showError('');

        const body = {
          nome: document.getElementById('nome').value,
          cpf: document.getElementById('cpf').value,
          email: document.getElementById('email').value
        };

        try {
          const data = await fetchJson(`${api}/auth/register`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
          });
          setUser(data.user);
          alert('Cadastro realizado com sucesso.');
        } catch (error) {
          if (error.status === 409 && error.payload?.user) {
            setUser(error.payload.user);
            alert('Usuário já existente, sessão carregada.');
            return;
          }
          showError(error.message);
        }
      });

      document.getElementById('requestForm').addEventListener('submit', async (event) => {
        event.preventDefault();
        showError('');
        const user = getUser();
        if (!user) {
          showError('Cadastre o cidadão primeiro.');
          return;
        }

        const body = {
          userId: user.id,
          category: document.getElementById('category').value,
          descricao: document.getElementById('descricao').value,
          endereco: document.getElementById('endereco').value,
          latitude: Number(document.getElementById('latitude').value),
          longitude: Number(document.getElementById('longitude').value),
          fotoUrl: document.getElementById('fotoUrl').value
        };

        try {
          const data = await fetchJson(`${api}/requests`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
          });
          alert(`Solicitação criada: ${data.protocol}`);
          loadRequests();
        } catch (error) {
          showError(error.message);
        }
      });

      document.getElementById('refreshBtn').addEventListener('click', loadRequests);

      const current = getUser();
      if (current) {
        setUser(current);
        loadRequests();
      }
    </script>
  </body>
</html>
