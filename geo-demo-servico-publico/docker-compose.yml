services:
  db:
    image: postgis/postgis:16-3.4
    container_name: geo-demo-db
    environment:
      POSTGRES_USER: geo
      POSTGRES_PASSWORD: geo
      POSTGRES_DB: geo_demo
    ports:
      - "5432:5432"
    volumes:
      - geo_demo_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U geo -d geo_demo"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: geo-demo-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  geo-demo-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: geo-demo-api
    ports:
      - "3340:3340"
    environment:
      PORT: 3340
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: geo
      DB_PASSWORD: geo
      DB_NAME: geo_demo
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: dev-access-secret
      JWT_REFRESH_SECRET: dev-refresh-secret
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      SMTP_HOST: smtp.mailtrap.io
      SMTP_PORT: 587
      SMTP_USER: change-me
      SMTP_PASS: change-me
      SMTP_SECURE: "false"
      MAIL_FROM: noreply@geo-demo.local
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  email-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: geo-demo-email-worker
    command: ["node", "workers/emailWorker.js"]
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: geo
      DB_PASSWORD: geo
      DB_NAME: geo_demo
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SMTP_HOST: smtp.mailtrap.io
      SMTP_PORT: 587
      SMTP_USER: change-me
      SMTP_PASS: change-me
      SMTP_SECURE: "false"
      MAIL_FROM: noreply@geo-demo.local
      EMAIL_QUEUE_CONCURRENCY: 5
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  geo_demo_db_data:
