services:
  db:
    image: postgis/postgis:16-3.4
    container_name: geo-demo-db
    environment:
      POSTGRES_USER: geo
      POSTGRES_PASSWORD: geo
      POSTGRES_DB: geo_demo
    ports:
      - "5432:5432"
    volumes:
      - geo_demo_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U geo -d geo_demo"]
      interval: 5s
      timeout: 5s
      retries: 10

  geo-demo-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: geo-demo-api
    ports:
      - "3340:3340"
    environment:
      PORT: 3340
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: geo
      DB_PASSWORD: geo
      DB_NAME: geo_demo
      JWT_SECRET: dev-access-secret
      JWT_REFRESH_SECRET: dev-refresh-secret
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  geo_demo_db_data:
