<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Painel Administrativo SLA</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="container">
      <section class="card">
        <h1>Painel Administrativo e SLA</h1>
        <p>Use credenciais de admin ou ouvidoria para consultar métricas e chamados.</p>
      </section>

      <section class="card">
        <h2>Login</h2>
        <div class="grid">
          <input id="email" placeholder="E-mail" value="admin@demo.local" />
          <input id="password" placeholder="Senha" type="password" value="Admin@123" />
          <button id="loginBtn" class="primary-btn">Entrar</button>
        </div>
      </section>

      <section class="card">
        <h2>Filtros</h2>
        <div class="grid">
          <input id="bairro" placeholder="Bairro" />
          <input id="categoria" placeholder="Categoria" />
          <input id="status" placeholder="Status" />
          <input id="dataInicio" type="date" />
          <input id="dataFim" type="date" />
          <button id="applyBtn" class="primary-btn">Aplicar filtros</button>
        </div>
      </section>

      <section class="card">
        <h2>Métricas</h2>
        <div id="metrics" class="grid"></div>
      </section>

      <section class="card">
        <h2>Chamados</h2>
        <table id="ticketsTable">
          <thead>
            <tr><th>ID</th><th>Bairro</th><th>Categoria</th><th>Status</th><th>SLA</th><th>Tempo</th><th>Ação</th></tr>
          </thead>
          <tbody></tbody>
        </table>
      </section>
    </main>

    <script src="./admin.js"></script>
  </body>
</html>
